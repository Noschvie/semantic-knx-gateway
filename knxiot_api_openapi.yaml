  parameters:
    
    collectionSize:
      name: page[size]
      description: |
        Specifies the number of items (as size) to return in the response. 
        - The server default value for **size** is vendor specific. It MUST be larger than zero, 
          otherwise client requests without this query parameter return an empty list. 
        - The actual returned number of items may be less than **size** if the last page does not contain enough items.
        - The maximum value is suggested to be a signed 32 bit (to ease sw implementations/interoperability), hence this the (implicit) maximum is specified accordingly with the format definition. 
      in: query
      schema:
        type: integer
        format: int32
        minimum: 1
        default: 65536

    collectionPage:
      name: page[number]
      description: |
        Specifies the number of pages to skip before starting to collect the result set of items. 
        - The server value for the **page size** is vendor specific. 
          To address a specific item (as a zero-based offset) in a collection > number = offset / page size 
        - The server default value for **number** MUST be zero, otherwise client requests without this query parameter cannot read all items. 
        - The maximum value is suggested to be a signed 32 bit (to ease sw implementations/interoperability), hence this the (implicit) maximum is specified accordingly with the format definition. 
      in: query
      schema:
        type: integer
        format: int32
        default: 0

