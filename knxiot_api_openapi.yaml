           the member value origin is a MaC project (another device)  
        
        a `meta` member expressing that the device is of type: 
          - **td:Thing** (a Thing Description class name, including its namespace identifier) 
          - **oms:dt.WaterMeter** (the URN definition, belonging to the open metering system class type definition) 
