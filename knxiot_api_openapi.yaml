openapi: 3.0.3

info:
  title: KNX IoT 3rd Party API
  version: 2.1.0
  description: |
    # Introduction
    This KNX IoT 3rd Party API offers an access at the level of the Installation 
    and supports more sophisticated queries to timeseries values of installation state 
    data or specific elements of the installation, such as location, application function and datapoints.

    The motivation for the KNX IoT 3rd Party API is to offer 
    a non-KNX certified communication partner a way to integrate with a KNX Classic Installation.

    ## API Versioning and Document Relations
    
    The here expressed API version (OAS element **openapi** )
    - is also included in the response of the node/server version information, for this see on details of EP /.well-known/knx 
    - corresponds to the KNX specification 3/10/4 with the version 2.2.x 
     
    Both versions mentioned above follows the Semantic Versioning Specification (major.minor.patch). The API version and/or 
    KNX specification 3/10/4 version may get independent minor or patch updates, hence the .minor/.patch versions will not be necessarily the same. 

    ## API Version History

    * `1.0.- | 05.07.2021` Initial version. 
    - `2.0.0 | 10.04.2022` Updated endpoint content, query filter and resource attributes.  
    - `2.1.0 | 13.07.2023` Approved standard, main changes are the update of value type "object" definition, additional node subscription possibilities, improved details for the link behavior. 
    - `2.1.0 | 31.07.2023` Detailed versioning description, added (optional) JSON member and OAS security scheme for linter check, added some add. HTTP response codes for WebSocket.

