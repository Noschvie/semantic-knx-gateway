    post:
      summary: Creates a (HTTP callback) subscription.
      description: |
        # General
        An individual HTTP callback subscription will be created at the server, as a result a subscription **id** is generated
        that belongs to all to this subscription involved datapoints. 

        # Details
        As specified in JSON API some members must be present on root level of primary (request/ response) data.     
        The server MUST ignore page-based pagination query parameters if part of the client request.  
       
        ## JSON API Member
        The following member are used as part of the request.

        ### Top Level
        
        -  `data` > contains the individual items, each MUST include < type > and - except when generate an item - also an < id >
        
        ### General Member
  
        -  `data` > to express one or more items to be subscribed upon (used for subscriptions)
        -  `attributes` > contains item characteristics (resource object properties)
        -  `relationships` > contains item relationships (relative links from primary data to other resources)
        -  `meta` > contains additional item information (type information and links) 
         
        If no specific information will be available for an item as part of a JSON API **general** member (such as `attributes`), 
        the member MUST NOT be expressed. 

        ### Member Properties
        The general member as described above MAY be empty, otherwise at least one mandatory property is present for an item.
        In this case this is reflected with the **_required_** definition in the scheme, see also response examples.

        Underneath defined rules to use namespace identifiers ensures the unambiguity of properties and its values. 

        - The member name and value of KNX vendor specific properties SHOULD be expressed with the corresponding namespace identifier. 
          
        - The member name and value of not in this API specified properties from the KNX information model MUST be expressed 
          with the corresponding namespace identifier from the KNX information model.
        
        In case the member value is originated from a project, the namespace identifier is MaC specific. 
        Member values MAY be expressed as a full IRI, for the member names this is NOT RECOMMENDED.  
        Properties may also cover complex data structures involving JSON objects, 
        here the content MUST follow the definitions from above.  
        
        Both property types from above placed in the general member `attributes`, JSON API `attributes` section 
        does not allow links or relationships member. In situations where this is needed to express, the general member 
        `meta` SHOULD be used in addition.

        ## Implementation Details
        The subscription **request** contains:
        
        1. at least one item to be subscribed upon, this can be:
          - a datapoint (one ore more), either addressed directly or items that contain datapoints
          - a node (one)
          - an installation (one ore more)
        
        2. the callback URL, shared secret, optional certificate and optional lifetime

        ### request body
        An array to bundle the to be upon subscribed items from above, each item with its individual type (such as location, datapoint, 
        node device or installation). 

        ### subscription notification characteristics
        
        #### datapoints
        The boolean `meta` member `expand` may be used to define the notification behavior **per** resource item:
          
        - true:  a notification comprises an occurred datapoint write access for all subordinated resources and its assigned datapoints
        - false: a notification comprises an occurred datapoint write access only for directly to the resources assigned datapoints, 
                 this is also the server default behavior for all subscriptions and its including items.
                
        The default behavior is applied if the member `expand` is missing. The value true will only affect items of resource type
        **location**, on all other resource types the server behaves with the default behavior. 
        Moreover, it is not possible to return this information when reading a subscription. 

        #### node
        The boolean `meta` member `expand` may be used to define the notification behavior of the node resource item:
          
        - true:  a notification comprises changes to the node and all installations hosted at this node
        - false: a notification comprises changes to the node, 
                 this is also the server default behavior for all subscriptions and its including items.
                
        The default behavior is applied if the member `expand` is missing. The value true will affect items of resource type 
        **device** or **service** (the two node variants). 
        Moreover, it is not possible to return this information when reading a subscription.   

        ### Notes
        As a note, the expanded behavior (true) results in individual notification messages for the *node* and *installation*. 
        An notification message may combine changes for both in one message. 
        
        Examples, see on status code 200.
      tags:
        - subscription
      operationId: createSubscription
      requestBody:
        description: |
          Subscription message data, containing of (JSON API) member:
          - `data` member > includes a relation to the collection of (to be upon subscribed) items
            - type
            - id is not present, it will be generated at the server
    
          - `attributes` member > expressing subscription callback data
            - url
            - secret
            - caCert
            - lifetime

          - `relationships` member > with at least one item to be subscribed upon
            - subscriptionDatapoints/data (data is a non-top level `data` member as an array of items containing datapoints) 
            - subscriptionNode/data (data is a non-top level `data` member as an object with a single node item)
            - subscriptionInstallations/data (data is a non-top level `data` member as an array of installations items)
            
            At least one of the relationships must be present in a request. 
            
          ### Notes
          The *content type* is as specified, but **application/json** is also allowed. 
          It is used as a fallback in case a client requests a similar format that the server can understand. To signal an error is not intended in such a case. 
        required: true
        content:
          application/vnd.api+json:
            schema:
              $ref: "./schemas/SubscribeRequest.json"
            examples:
              Datapoints:
                $ref: "#/components/examples/SubscribeUponDatapointsExample"
              Node:
                $ref: "#/components/examples/SubscribeUponNodeDefaultExample"  
              NodeExtended:
                $ref: "#/components/examples/SubscribeUponNodeExtendedExample"
              Installations:
                $ref: "#/components/examples/SubscribeUponInstallationsExample"  
              DatapointNode:
                $ref: "#/components/examples/SubscribeUponDatapointsNodeExample" 
      callbacks:
        datapoint_CoV_event:
          $ref: "#/components/callbacks/eventNotification"
      responses:
        "201":
          description: |
            The generated subscription id is returned, 
            depending on the used resource types from the subscription request one or more links to the subscription hosting: 
            - all included datapoints (member `subscriptionDatapoints`)
            - all included installations (member `subscriptionInstallations`)
            - the included node (member `subscriptionInstallations`)
          content:
            application/vnd.api+json:
              schema:
                $ref: "./schemas/SubscribeResponse.json" 
              examples:
                Datapoints:
                  summary: Subscribe to datapoints
                  description: |
                    The example shows a subscription response in a local environment.  
                    The subscription callback data (normally part of **general** JSON API members `attributes`) 
                    are NOT returned at all. 
                  value:
                    data:
                      id: 123e4567-e89b-12d3-a456-426614174000
                      type: subscription
                      relationships:
                         subscriptionDatapoints:
                           links:
                              related: /subscriptions/123e4567-e89b-12d3-a456-426614174000/datapoints     
                DatapointsNode:
                  summary: Subscribe to datapoints and node
                  description: |
                    The example shows a subscription response in a local environment.  
                    The subscription callback data (normally part of **general** JSON API members `attributes`) 
                    are NOT returned at all. 
                  value:
                    data:
                      id: 123e4567-e89b-12d3-a456-426614174000
                      type: subscription
                      relationships:
                         subscriptionDatapoints:
                           links:
                              related: /subscriptions/123e4567-e89b-12d3-a456-426614174000/datapoints   
                         subscriptionNode:
                           links:
                              related: /subscriptions/123e4567-e89b-12d3-a456-426614174000/node    
          links: 
            getSubscriptionById:
              operationId: getSubscription 
              parameters: 
                subscriptionId: $response.body#/data/id
              description: "the in response returned **id** can be used as an input {subscriptionID} to get an individual subscription"  
        "202":
          description: Accepted, but not processed yet. 
        "400":
          $ref: "#/components/responses/httpStatusBadRequest"
        "401":
          $ref: "#/components/responses/httpStatusUnauthorized"
        "403":
          $ref: "#/components/responses/httpStatusForbidden"
        "404":
          $ref: "#/components/responses/httpStatusNotFound"
        "405":
          $ref: "#/components/responses/httpStatusMethodNotAllowed"
        "406":
          $ref: "#/components/responses/httpStatusNotAcceptable"
        "409":
          $ref: "#/components/responses/httpStatusConflict"
        "414":
          $ref: "#/components/responses/httpStatusURITooLong"
        "415":
          $ref: "#/components/responses/httpStatusUnsupportedContentFormat"
        "422":
          $ref: "#/components/responses/UnprocessableEntity"  
        "429":
          $ref: "#/components/responses/httpStatusTooManyRequests"
        "500":
          $ref: "#/components/responses/httpStatusDefaultError"
        "501":
          $ref: "#/components/responses/httpStatusNotImplemented" 
        "503":
          $ref: "#/components/responses/httpServiceUnavailable"   
        "504":
          $ref: "#/components/responses/httpStatusRequestTimeout"
        "505":
          $ref: "#/components/responses/httpStatusVersion"
      security:
        - OAuth2: [manage]
          

  /messaging/ws:
    get:
      summary: Creates a (WebSocket) subscription.
      description: |
        # General
        Enables a bidirectional communication to establish subscriptions and notifications.

        # Notes
        The WebSocket communication pattern and data format is not expressed as API definition in this OAS (YAML) file.
        Major HTTP handshake response codes are defined below, the RFC 6455 defines some error handling with codes such as 400 (clause 4.2.1)
        , 401 ... 404. Other codes are possible, but not detailed in this file.

        # Details
        The endpoint allows to:
        - subscribe to CoV of datapoints 
        - read/write datapoint values
           
      tags:
        - subscription
      operationId: createWebsocket
      parameters:
        - $ref: "#/components/parameters/WsUpgrade"
        - $ref: "#/components/parameters/WsConnection"
        - $ref: "#/components/parameters/WsKey"
        - $ref: "#/components/parameters/WsProtocol"
        - $ref: "#/components/parameters/WsVersion"
      responses:
        "101":
          description: Switching to Websocket protocol, continue to sending data envelopes.
          headers:
            Upgrade:
              schema:
                type: string
                enum: [websocket]
              description: Mandatory RFC 6455 header with fixed value `websocket`.
            Connection:
              schema:
                type: string
                enum: [Upgrade]
              description: Mandatory RFC 6455 header with fixed value `Upgrade`.
            Sec-Websocket-Accept:
              schema:
                type: string
              description: Mandatory RFC 6455 header with base64 encoded SHA1- value of... (see RFC).
            Sec-Websocket-Protocol:
              schema:
                type: string
                enum: [gw.knx.org]
              description: Optional RFC 6455 header, in this API mandatory with fixed value
                `gw.knx.org`.
        "200": 
          description: Client specific (error) handling, RFC 6455 does not specify an **explicit** 200 handling, see clause 4.1. 
        "400":
          $ref: "#/components/responses/httpStatusBadRequest"
        "401":
          $ref: "#/components/responses/httpStatusUnauthorized"  
        "404":
          $ref: "#/components/responses/httpStatusNotFound"  
        "500":
          $ref: "#/components/responses/httpStatusInternalServerError"
        default:
          $ref: "#/components/responses/httpStatusDefaultError"
      security:  
        - OAuth2: [manage]
          

components:
  callbacks:
    eventNotification:
      "{$request.body#/attributes/url}":
        post:
          summary: Callback notification event
          description: |
            Invokes a callback of the subscribed items for the following changes:
            - a successful update of a datapoint; a write access with don't care if the value was changed
            - node property changes, including vendor specific properties; it is subject to a vendor to decide on which properties a notification is requested
            - installation property changes, including any other change of an installation; it is subject to a vendor to decide on which properties a notification is requested
            
            It uses the URL specified on the subscription call, defined as `attributes/url`member. Following headers are required:
              1. Host
              2. X-Callback-Signature
              3. Content-Length 
              4. Date
            
            Notes
            - Only #2 - as a non standardized HTTP header - is explicitly expressed as a header parameter in this file.   
            - Except from #2 there are no further security requirements defined for the callback as such, hence the below defined 
              security scheme for the callback is empty (#2 is not a specified OAS security scheme). The obligatory transport security (HTTPS) including 
              to handle certificates are common requirements of the KNX specification 3/10/4.
          operationId: callSubscriptionEvent
          parameters:
            - name: X-Callback-Signature
              in: header
              required: true
              description:
                A base64 encoded HMAC-SHA256 signature as a concatenation of the entire message request-line (including the CRLF), 
                HTTP header values of Host, Date, Content-Length, and the entire message body. 
                The secrecy key to generate the HMAC is part of the subscription request (secret member).
              schema:
                type: string
                format: PEM
          requestBody:
            description: |
              Event message data, containing of (JSON API) `data` member, specifying a a collection items, each with 
              - id
              - type (datapoint,node,installation)
              - self reference (as part of `links` member)
              - attributes members
                
                - For an datapoint the value/ time stamp members (at this point a write access happened), therefore the properties 
                  must be present/ available. There is no information of the datapoint type included in the event. 
                - For an installation some defined installation members, including vendor specific things. 
                - For an node some defined node members, including vendor specific things.   
              
              ### Notes      
              The *content type* is as specified, but **application/json** is also allowed.  
              It is used as a fallback in case a client requests a similar format that the server can understand. To signal an error is not intended in such a case.
            required: true
            content:
              application/vnd.api+json:
                schema:
                  $ref:  "./schemas/UpdateEvent.json"
                examples:
                  Datapoints:
                    $ref: "#/components/examples/UpdateEventDatapointsExample"
                  DatapointsNode:
                    $ref: "#/components/examples/UpdateEventDatapointsNodeExample"  
          responses:
            "200":
              description: The callback request was successfully communicated.
            "401":
              $ref: "#/components/responses/httpStatusUnauthorized"
            "405":
              $ref: "#/components/responses/httpStatusMethodNotAllowed"  
            "500":
              $ref: "#/components/responses/httpStatusDefaultError"
            "501":
              $ref: "#/components/responses/httpStatusNotImplemented"
            "505":
              $ref: "#/components/responses/httpStatusVersion"  
          security: []

  responses:
    
    Access200:
      description: |
        The response (in both cases of retrieve/refresh an access token, RFC clause 5.1) with message data 
        containing of (JSON) member:
        - access token (mandatory)
        - token type (mandatory, here _Bearer_)
        - expiration (in RFC recommended, here mandatory)
        - refresh token (optional)
        - scope (optional, if identical to the scope requested by the client; otherwise required)
        
        According to RFC 6749, clause 5.1 the response payload must be conform with application/json.  
      content:
        application/json:
          schema:
            $ref: "./schemas/Access.json"
          examples:
            Runtime1:
              summary: Runtime (Standard Token)
              description: | 
                A standard access token with a lifetime of 24 minutes. Additionally a refresh token. 
                The with this access token granted scope is **write**. 
              value:
                access_token: AccessTokenExample
                token_type: Bearer
                refresh_token: RefreshTokenExample
                expires_in: 1440
                scope: write

    httpStatusBadRequest:
      description: Bad request data.
      content:
        application/vnd.api+json:
          example:
            errors:
              - title: Bad Request
                links: https://schema.knx.org/2020/api
                status: "400"
                detail: Bad request error.
          schema:
            $ref: "./schemas/Errors.json"

    httpStatusConflict:
      description: Serving the request leads to a conflict.
      content:
        application/vnd.api+json:
          example:
            errors:
              - title: Conflict
                links: https://schema.knx.org/2020/api
                status: "409"
                detail: Conflict error. Serving the request leads to a conflict.
          schema:
            $ref: "./schemas/Errors.json"
    
    UnprocessableEntity:
      description: server understands the content type of the request entity, 
       and the syntax of the request entity is correct, but it was unable to process the contained instructions.
      content:
        application/vnd.api+json:
          example:
            errors:
              - title: Unprocessable Entity
                links: https://schema.knx.org/2020/api
                status: "422"
                detail: Syntax error. Unable to process the contained instructions.
          schema:
            $ref: "./schemas/Errors.json"        

    NodeCertificate:
      description: Node device X.509 certificate
      content:
        application/pkcs7-mime:
          schema:
            type: string
          example: <x.509v3 certificate>

    DataPoint200:
      description: |
        The response with message data containing of (JSON API) member:
        - `meta` member > additional info (in case no item is available)
        - `data` member > datapoint item, including:
          - id/ type
          - `attributes` member > expressing specific datapoint characteristics 
            
            The value is formatted as follows:
              
            - JSON string, containing: 
                1. enumerations (strings containing an individual enumeration value)
                2. numbers (strings containing a number value)
                3. strings (UTF-8 strings)
                4. strings (ISO8601 encoded strings)

            - JSON array, containing elements of #1 .. #4 from above

          - `meta` member > expressing additional meta information of the datapoint
            - `typedescription` > an URL to additional information that hosts potentially human readable data
            - `@type` > additional type information
          - `relationships` member > a relationships section with links to: 
            - an endpoint providing all functions where this datapoint is included
            - an endpoint providing the device where this datapoint is included
            - an endpoint providing the proxy (device) where this datapoint is represented
            - an endpoint providing all subscriptions where this datapoint is included in    
      content:
        application/vnd.api+json:
          schema:
            $ref: "./schemas/Datapoint.json" 
          examples:
            Runtime0:
              $ref: "#/components/examples/DatapointItemEnumExample0"
            Runtime1:
              $ref: "#/components/examples/DatapointItemNumberExample1"  
            Runtime2:
              $ref: "#/components/examples/DatapointItemNumberExample2"  
            Runtime3:
              $ref: "#/components/examples/DatapointItemArrayExample3"   
            Runtime4:
              $ref: "#/components/examples/DatapointItemStringExample4"   
            

    DataPointCollection200:
      description: |
        The response with message data containing of (JSON API) member:
        - `meta` member > collection information
        - `data` member > collection of datapoint items, each including:
          - id/ type
          - `attributes` member > expressing specific datapoint characteristics
          
            The value is formatted as a JSON string, containing  types of: 
            1. enumerations, as strings containing an individual enumeration value
            2. numbers, as strings containing a number value
            3. strings, as UTF-8 strings
            4. strings, as ISO8601 encoded strings
            5. array of elements from #1 .. #4 above
            
          - `meta` member > expressing additional meta information of the datapoint
            - `typedescription` > an URL to additional information that hosts potentially human readable data
            - `@type` > additional type information
          - `relationships` member > a relationships section with links to:
            - an endpoint providing all functions where this datapoint is included
            - an endpoint providing the device where this datapoint is included
            - an endpoint providing the proxy (device) where this datapoint is represented   
            - an endpoint providing the subscriptions where this datapoint is included in  
      content:
        application/vnd.api+json:
          schema:
            $ref: "./schemas/DatapointCollection.json"
          examples:
            Runtime:
              $ref: "#/components/examples/DataPointCollectionExample"

    Timeseries200: 
      description: |
        The response with message data containing of (JSON API) member:
        - `meta` member > collection information
        - `data` member > collection of time series items, each including:
          - id/ type
          - `attributes` member > expressing specific time series characteristics
            - value/ timestamp
          - `relationships` member > a relationships section with links to:
            - an endpoint providing the datapoint is related to this time series
      content:
        application/vnd.api+json:
          schema:
            $ref: "./schemas/Timeseries.json" 
          examples:
            Runtime0:
              $ref: "#/components/examples/TimeseriesItemExample"
