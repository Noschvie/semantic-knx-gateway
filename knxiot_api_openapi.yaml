    DatapointItemArrayExample3:
      summary: Array Value 
      description: |
        The example shows shows a received array with values, the format of the value is a (JSON) array. 
        
        The array values are JSON strings.
        The current value is "de-DE" as 4x a char (a char is a string of len 1), 
        formatted  from received octet stream "100 101 68 69" (whitespaces only inserted for readability) with code page 8859-1 
        (see datapointType), interpreted as “de-DE”.
        
        The type is of _datapoint_, it includes: 
  
        an `attributes` member expressing that datapoint contains of: 
        -  **datapointType** (an additional datapoint type information as IRI with namespace identifier)
        
        a `meta` member expressing that the datapoint type is of: 
        - **knx:FunctionPoint** point type (a KNX Information Model class name, including its namespace identifier) 
  
