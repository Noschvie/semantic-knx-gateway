        - Not in this API specified attributes/ relationships from the KNX information model SHOULD be expressed 
          with its corresponding data property name from the KNX information model.
        
        ## Implementation Details
        It must be ensured that updated/overwritten (not touched) properties do not impact the current operational state.
        - url (may need to change)
        - secret (may need to change) 
        - caCert (a subscription may expire and needs to be refreshed) 
        - lifetime (may need to change) 
        
