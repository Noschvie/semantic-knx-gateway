    typeFilter:
      name: filter[meta.@type][operator]
      description: |
        Specifies the type of resource to be filtered on, additionally with an optional 
        operator to perform logical/ comparison operations.  Example is to filter for a location that has a _type_  
        value of _Floor_ or filter for all locations being either a floor or space.

        - The parameter value is specified with a KNX Information Model class **name** or (if available) the - to this class - assigned URN. 
          
          The KIM classes can be devices, datapoints, locations or application functions and other. The individual name is 
          the remainder of the IRI when removing the corresponding namespace prefix, such as 
          - **loc:** from <http://schema.knx.org/2020/ontology/loc#Floor> -> Floor
          - **core:** from <http://schema.knx.org/2020/ontology/core#Device> -> Device
         
          In case of KNX Information Model content the name/ value namespace identifier can be omitted (if used, 
          also the ":" namespace delimiter must be % encoded). 

        - The parameter name is specified for the part **meta.@type** fix as it is defined.  
        
        - The parameter name is specified for the part **operator** with the logical 
          operators of eq, le, ge, lt, gt, and, or. The parameter name part **operator** is optional, if not expressed 
          it is used with the default eq (then the filter is a simple equal to filter).  

      in: query
      required: false
      schema:
        type: object
        additionalProperties:   
          type: string
      examples: 
        E0: 
          summary: filter for rooms, as class
          value: 
            filter[meta.@type]: Room 
        E1: 
          summary: filter for rooms or floors, as class
          value: 
            filter[meta.@type][or]: Room,Floor 
        E2: 
          summary: filter for rooms, as URN
          value: 
            filter[meta.@type]: urn:knx:loc.room   
        E3: 
          summary: filter for devices, as class
          value: 
            filter[meta.@type]: Device 
        E4: 
          summary: filter for devices, as class with namespace
          value: 
            filter[meta.@type]: core:Device  
        E5: 
          summary: filter for vendor tings (a device), as class with namespace
          value: 
            filter[meta.@type]: oms:dt.HeatMeter    
        E6: 
          summary: filter for (specific) datapoints, as class 
          value: 
            filter[meta.@type]: dpa.321.51     

    tagFilter:
      name: filter[tagKey][operator]    
      description: |
        Specifies a filter for resources that are assigned to specific tags, additionally with an optional 
        operator to perform logical/ comparison operations. 
        Examples are a point that acts on a related (tag) _temperature_, a building that is used as an (tagged) _airport_ 
        or a device that operates for the trade _HVAC_. 

        ### Parameter Value
       
        - The parameter value is specified with the **name** of a KNX Information Model individual of class tag:Tag. 
        
          The individual name is the remainder of the IRI when removing the corresponding namespace prefix, such as **tag**: 
          from <http://schema.knx.org/2020/ontology/tag#actuator> -> actuator
        
        ### Parameter Name

        - The parameter name is specified for the part **tagKey** with a structure of KIM object property 
          relationship predicates, as follows:  
            
          - hasTagSet.hasTag -> a combination of two parent OPs
          - hasTag -> a single parent OP
        
          The described parent OPs have a dedicated range to all possible tag individuals of KIM class :Tag, on using them all 
          tags will be filtered and included in the result. To limit the results related child OPs needs to be used, 
          mainly from hasTag, but also from hasTagSet (or in a combination). 
        
          - hasTagSet.hasTag (two parent OPs are used)
          - hasQualityKind.hasTag (a child property is used for the first part)
          - hasTagSet.hasOrigin (a child property is used for the second part)
          - ... 

          Present parent and child OPs are defined in the KNX Information Model. Not all available child OPs makes sense in every
          combination from above, usable child OPs (and ist possible combinations) are described in the written specification. 

        - The parameter name is specified for the part **operator** with the logical 
          operators of eq, le, ge, lt, gt, and, or. The parameter name part **operator** is optional, if not expressed 
          it is used with the default eq (then the filter is a simple equal to filter).  

        ### Notes
    
        If a chosen parameter name/ value combination does not match content wise or logically, a matching MAY be 
        not able to retrieve/ calculate from the server, for this an error must be returned. 

        In case of KNX Information Model content the name/ value namespace identifier can be omitted (if used, 
        also the ":" namespace delimiter must be % encoded). If two KIM properties have the same name and the namespace is 
        not used as part of the filtering the server behavior is unspecified. For other content it is recommended to add namespaces, 
        otherwise corresponding KIM properties with the same name are prioritized.
         
      in: query
      required: false
      schema:
        type: object
        additionalProperties:   
         type: string 
      examples:
          E1:
            summary: Filter for a specific location usage
            value: 
              filter[hasLocationUsage]: airport  
          E2:
            summary: Filter for a point with a specific combination of interface types
            value: 
              filter[hasPointInterface]: if.i,if.p
          E3:
            summary: Filter for a point that acts upon an equipment
            value: 
              filter[actsOnPhenomenonType.hasEquipmentType]: actuator     
          E4:
            summary: Filter for a point that has a specific tag assigned
            value: 
              filter[hasTag]: switch     
             
    attributeFilter:
      name: filter[attributeKey][operator]       
      description: |
        Specifies a filter for a resource item that matches a specific attribute, additionally with an optional 
        operator to perform logical/ comparison operations. Example is to filter for a device that has a _order number_  
        value of _5WG100-200-AB_ or filter for all datapoints with a temperature (attribute) value lower than 30°C.  
       
        - The parameter value is specified with arbitrary terms defined as: 
          - MaC project (strings) 
          - timestamp (time) values
          - Datapoint (string) values
          - KIM individual (IRI) names 

          Depending on the related resource item member the value needs to be interpreted in different ways.

          - **String** -> lexical order, also for "lower than" compare ops
          - **Number** -> Numbers are interpreted according to JSON, clause 6 
          - **Time** -> RFC 3339, clause 5.6
          - **IRI** -> same as String above, the KIM individual name is the remainder of the IRI when removing 
          the corresponding namespace identifier, such as unit: from <http://qudt.org/vocab/unit/DEG_C> -> DEG_C

        - The parameter name is specified for the part **attributeKey** with an `attributes` API reference member,
          vendor specific key or as an entire JSON Object.  

        - The parameter name is specified for the part **operator** with the logical 
          operators of eq, le, ge, lt, gt, and, or. The parameter name part **operator** is optional, if not expressed 
          it is used with the default eq (then the filter is a simple equal to filter).  

        In case of KNX Information Model content the name/ value namespace identifier can be omitted (in case it is used, 
        also the ":" namespace delimiter must be % encoded). If two KIM properties have the same name and the namespace is 
        not used as part of the filtering the server behavior is unspecified. For other content it is recommended to add namespaces, 
        otherwise corresponding KIM properties with the same name are prioritized.
               
      in: query
      required: false
      schema:
        type: object
        additionalProperties:   
          type: string
      examples:
          E1:
            summary: Filter for an order number
            value: 
              filter[orderNumber]: 5WG100-200-AB  
          E2:
            summary: Filter for a device (title) name
            value: 
              filter[title]: 16-fold Actuator  
          E3:
            summary: Filter for a function property
            value: 
              filter[state]: Tested 
          E4:
            summary: Filter for a vendor specific device property
            value: 
              filter[gira:deviceUpdateCycle]: immediately
          E5:
            summary: Filter for a value lower than ...
            value: 
              filter[value][le]: "30"  
          E6:
            summary: Filter for a device in a state
            value: 
              filter[state][eq]: Edited  
          E7:
            summary: Filter for a device in two states
            value:  
              filter[state][or]: Edited,Tested    

    timeFilter:
      name: filter[timestamp][operator]    
      description: |
        The parameter filters depending on a period or point in time, expressed with an optional 
        operator to perform time oriented logical/ comparison operations.  
       
        - The parameter value is specified with date-time with RFC 3339.  
   
        - The parameter name is specified for the part **timestamp** with an `attributes` member API reference name _timestamp_.
        
        - The parameter name is specified for the part **operator** with the logical 
          operators of <eq, le, ge, lt, gt, and, or>. The parameter name part **operator** is optional, if not expressed 
          it is used with the default eq (then the filter is a simple equal to filter, for the use case 
          to work with timestamps comparisons with less practical use). 

        The filter is specified to be used only with the datapoint `attributes` member  _value_, it can be applied more 
        than once per request (with different operators), such as when defining a period.
        
        ### Notes

        This filter definition is only a more specific form of the generic **filter[attributeKey][operator]** filter.
        It is used on endpoints to return:
            
          - datapoint value/ timestamp series per **individual** datapoint
          - datapoints where a value change was occurring
          
        Examples, all value/ timestamp series with an **value changes** of an individual datapoint _since_ yesterday 11AM or 
        all datapoints with a **value change** occurred _after_ yesterday 11AM.
      in: query
      required: false
      schema:
        type: object
        additionalProperties:
          type: string 
      examples:
          E1:
            summary: all 'value changes', occurred after ...
            value:  
              filter[timestamp][ge]: "2021-02-17T17:17:13Z" # quotes added additionally to prevent UI renderer problems  
          E2:
            summary: all 'value changes', occurred before ...
            value:  
              filter[timestamp][le]: "2021-02-17T17:17:17Z" # quotes added additionally to prevent UI renderer problems    
          E3:
            summary: all 'value changes', occurred between ...
            value:  
              filter[timestamp][ge]: "2021-02-17T17:17:13Z" # quotes added additionally to prevent UI renderer problems
              filter[timestamp][le]: "2021-02-17T17:17:17Z" # quotes added additionally to prevent UI renderer problems 
  
  requestBodies:
    
    datapointValuesPut:
      description: |
        Datapoints message data, containing of (JSON API) member: 
          - `data` member -> collection of (to be written datapoint) items
        
        ### Notes 
        The *content type* is as specified, but **application/json** is also allowed. 
        It is used as a fallback in case a client requests a similar format that the server can understand. To signal an error is not intended in such a case.
      required: true
      content:
        application/vnd.api+json:
          schema:
            $ref: "./schemas/DatapointCollectionWithValues.json"
          examples:
            Runtime0:
              summary: String Values
              description: Several value type "string" values, as a boolean and (float) number.
              value:
                data:
                  - id: ebe13789-1f1e-47d0-8f8a-d00000000000
                    type: datapoint
                    attributes:
                      value: "off"
                  - id: ebe13789-1f1e-47d0-8f8a-d00000000001
                    type: datapoint
                    attributes:
                      value: "77.25"
            Runtime1: 
              summary: Array Value 
              description: A value type "object" value, as a date/time and boolean (both are part of an individual datapoint respectively its type).
              value:
                data:
                  - id: ebe13789-1f1e-47d0-8f8a-d00000000002
                    type: datapoint
                    attributes:
                      value: ["2021-02-17T17:17:17Z","1"] 
                   

  securitySchemes:
    OAuth2:
      type: oauth2
      description: | 
        Usage of standard oauth 2.0 **Authorization Code** and **Client Credentials** flow. 
        All URLs are relative to the server URL.
        1. The handling of user **authorization** endpoint is not specified in this API (authorizationUrl). 
        2. The corresponding **token** endpoint is specified (tokenUrl, refreshUrl), it allows to initially 
           get an access token or refresh it.  
      
      flows:
        authorizationCode:
          authorizationUrl: /oauth
          tokenUrl: /oauth/access
          refreshUrl: /oauth/access
          scopes:
            read: Allows to read resources (does not include other scopes, scopes can be combined together). 
            write: Allows to write resources (does not include other scopes, scopes can be combined together). 
            manage: Allows to manage extended functionality of the API, 
                    currently only subscription interfaces (does not include other scopes, scopes can be combined together).
        
        clientCredentials:
          tokenUrl: /oauth/access
          refreshUrl: /oauth/access
          scopes:
            read: Allows to read resources (does not include other scopes, scopes can be combined together). 
            write: Allows to write resources (does not include other scopes, scopes can be combined together). 
            manage: Allows to manage extended functionality of the API, 
                    currently only subscription interfaces (does not include other scopes, scopes can be combined together).          
      
    BasicAuthentication:
      type: http
      scheme: basic
      description: |
        Usage of Basic Authentication Scheme as authentication. 
        This security scheme is intended to be used when accessing the token endpoint from authorization server (and some other EPs).
        For this see workflow described on authorization section in this file. 