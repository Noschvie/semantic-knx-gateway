        on the server (therefore PATCH, see also https://jsonapi.org/faq/#wheres-put ). 

        # Details
        As specified in JSON API at least one of the members `meta`, `data` or `error`must be present. 
        The server MUST ignore page-based pagination query parameters, if part of the client request.       
        
        ### JSON API Member
        The following member are used as part of the response:
        
        -  `meta` > as top level member > if expressed it contains a reason in case no subscription item is available 
        -  `data` > as top level member > contains the individual items; as general member > currently not explicitly used 
