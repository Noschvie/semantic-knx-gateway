        The example shows a returned device (in this example as a common device) 
        
        The type is of _device_, it includes: 
          
        an `attributes` member expressing that the device contains of: 
        -  **orderNumber** (the vendor specific order number)
        -  **lastModified** (the last date of modification in the MaC project)
