  contact:
    name: KNX Association cvba
    email: support@knx.org
    x-compatible-knx-ontologies:
      - name: v2
        url: http://schema.knx.org/2020/ontology/v2
  license:
    name: MIT License
    url: https://opensource.org/licenses/MIT

servers:
  - url: "{protocol}://{authority}/{path}"
    variables:
      protocol:
        description: The protocol selection is always https.
          - in the public environment (WAN) with OAuth2 TLS is mandatory
          - in the local  environment (LAN) with Basic Authentication TLS is mandatory
        enum: [https]
        default: https
      authority:
        description: corresponds to the host or service name of the KNX IoT 3rd Party API interface
        default: gateway.knx.local
      path:
        description: corresponds to the URL base part of the KNX IoT 3rd Party API endpoints
        default: api/v1

tags:
  - name: authorization
    description: Endpoints involved in the security /authorization process.
  - name: datapoint
    description: Endpoints exposing datapoints to the clients.
  - name: device
    description: Endpoints exposing devices to the clients.
  - name: function
    description: Endpoints exposing functions to the clients.
  - name: information
    description: Endpoints containing information from the node (server) and hosted installation.
  - name: location
    description: Endpoints exposing the location structure to clients.
  - name: subscription
    description: Endpoints handling subscriptions.
  - name: timeseries
    description: Endpoints handling timeseries data.  

paths:
  /.well-known/knx/idevid:
    get: 
      tags:
        - authorization
      summary: Read manufacturer device certificate.
      description: |
        # General
        List the manufacturer device certificate, details see below.

        # Details
        The endpoint MUST be accessible without any defined scope from the resource endpoints (manage/read/write), 
        the authentication method/data depends on the chosen OAuth2 grant types. It is secured with OAuth2. 
        To access it the authorization request MAY contain no scope at all or it reuses known scopes such as __profile__ from 
        OpenID Connect, this is vendor specific. As a result an access token is issued that grants a general access from the user.
        Transport security is mandatory.

        As specified in JSON API some members must be present on root level of primary (request/ response) data.  
        The server MUST ignore page-based pagination query parameters, if part of the client request.

        ## JSON API Member
        The following member are used as part of the response.

        ### Top Level
        
        -  `meta` > contains information on the collection or on a single item 
        -  `data` > contains the individual items, each MUST include < type > and - except when generate an item - also an < id >
        
        For an collection the **top** level member `meta` MUST be always expressed with its members, even on empty collections.
        For an single item the **top** level member `meta` MAY be used, such as to add information why it is not present.
      
        ### General Member
  
        -  `data` > to express one or more items to be subscribed upon (used for subscriptions)
        -  `attributes` > contains item characteristics (resource object properties)
        -  `relationships` > contains item relationships (relative links from primary data to other resources)
        -  `meta` > contains additional item information (type information and links) 
         
        If no specific information will be available for an item as part of a JSON API **general** member (such as `attributes`), 
        the member MUST NOT be expressed. 

        ### Member Properties
        The general member as described above MAY be empty, otherwise at least one mandatory property is present for an item.
        In this case this is reflected with the **_required_** definition in the scheme, see also response examples.

        Underneath defined rules to use namespace identifiers ensures the unambiguity of properties and its values. 

        - The member name and value of KNX vendor specific properties SHOULD be expressed with the corresponding namespace identifier. 
          
        - The member name and value of not in this API specified properties from the KNX information model MUST be expressed 
          with the corresponding namespace identifier from the KNX information model.
        
        In case the member value is originated from a project, the namespace identifier is MaC specific. 
        Member values MAY be expressed as a full IRI, for the member names this is NOT RECOMMENDED.  
        Properties may also cover complex data structures involving JSON objects, 
        here the content MUST follow the definitions from above.  
        
        Both property types from above placed in the general member `attributes`, JSON API `attributes` section 
        does not allow links or relationships member. In situations where this is needed to express, the general member 
        `meta` SHOULD be used in addition.
        
        Examples, see **Runtime** example on status code 200.

        ## Implementation Details
        LDevID > the operational certificate for the device
        IDevID > the manufacturer factory default setup certificate for the device

        This specification does not define how to configure the LDevID/IDevID certificate at the server. 

        ### Public Environment
        In a public environment the certificate is specified according to RFC 5280. 
                
        - The LDevID certificate MUST be supported.
        - The IDevID certificate is not applicable.
        
        The certificate MUST contain at least the basic certificate fields as specified in the written AN.  

        ### Local Environment
        In a local environment the certificate is specified according to IEEE 802.1AR-2018. 
        
        - The LDevID certificate MAY be supported.
        - The IDevID certificate MUST be supported. 

        LDevID certificates MUST NOT use of wildcards in the subject CN or SAN extension field, 
        moreover, the certificate SHALL not include more than one SAN extension field. 

        LDevID certificates MUST be dropped in case of a master reset of the KNX IoT 3rd Party API server.

        In case no (operational) LDevID certificate is configured, the KNX IoT 3rd Party API server 
        MUST use the IDevID certificate for the Secure Communication (TLS session).  
      operationId: readIDevID
      responses:
        "200":
          $ref: "#/components/responses/NodeCertificate"
        "400":
          $ref: "#/components/responses/httpStatusBadRequest"
        "401":
          $ref: "#/components/responses/httpStatusUnauthorized"
        "403":
          $ref: "#/components/responses/httpStatusForbidden"
        "404":
          $ref: "#/components/responses/httpStatusNotFound"
        "405":
          $ref: "#/components/responses/httpStatusMethodNotAllowed"
        "406":
          $ref: "#/components/responses/httpStatusNotAcceptable"
        "409":
          $ref: "#/components/responses/httpStatusConflict"
        "414":
          $ref: "#/components/responses/httpStatusURITooLong"
        "415":
          $ref: "#/components/responses/httpStatusUnsupportedContentFormat"
        "422":
          $ref: "#/components/responses/UnprocessableEntity"   
        "429":
          $ref: "#/components/responses/httpStatusTooManyRequests"
        "500":
          $ref: "#/components/responses/httpStatusDefaultError"
        "501":
          $ref: "#/components/responses/httpStatusNotImplemented"   
        "504":
          $ref: "#/components/responses/httpStatusRequestTimeout"
        "505":
          $ref: "#/components/responses/httpStatusVersion"
      security: []

