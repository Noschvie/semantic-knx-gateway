    WellKnownKNX200:
      description: |
        The response with message data containing of (JSON) member:
        - `api` member > most recent supported API version item, including: 
          - version identifier
          - base path
          - templates > hosting URI template placeholders and its values, additionally a relation identifier 
        - `supportedversions` member > additionally supported (older) API version items, including: 
          - version
          - base
        - `links` member > collection of Endpoints from the KNX IoT 3rd Party API, 
           additionally, from a KNX manufacturer, each item including:
          - relative link
          - templates > hosting URI template placeholders and its values
          - add. type description
          - content type format 
          - relation identifier 
        - `context` member > in the API used IRIs and its namespace prefix definitions
          - prefix
          - iri

        ### DETAILS
        #### api/version 
        
        The _version_ member contains the most recent API version the server supports, it SHALL contain of a major.minor.patch 
        numbering scheme, represented as a string. The major number with value 0 SHALL NOT be used, 
        for the minor/patch number it is RECOMMENDED to start with value 0.
        
        #### api/supportedversions 
        
        The _supportedversions_ member contains the from the server supported older API versions (in addition to the most 
        recent API version from above). Depending on a performed API change the major, minor or patch number SHALL be incremented. 
        
        - APIs with a different major version are incompatible, in case a server supports such older (incompatible) API versions 
          on purpose this information needs to be part of the 'supportedversions' member.
        
        - APIs with the same major version are upward compatible, usually a client ignores the minor or patch number. Hence this 
          only the latest major version is needed as part of the 'supportedversions' member. To allow a client checking for a specific
          version the client relies on, all available versions can be expressed, this is for client convenience/check reasons 
          (see also example below).

        #### api/base 

        - The _base_ member from above SHALL express the versioning part of the URL. It MAY also address further requested 
          resources such as a user installation as part of a cloud database. Since the _base_ member is part of the URL, 
          it is NOT RECOMMENDED to leave it empty. 

          The _base_ member as such is not specified with a trailing “/” at the end. As defined in the  
          specification the {path} is composed from the base member together with the individual resource path 
          definitions, all of them starts with a heading “/”.  This needs to be considered when calculating 
          the {paths} from its individual parts, nevertheless, the result for the {path} needs to be the same
          as formally described in the specification.

        - The _base_ member may use an URI-Template from RFC 6570, In such a case the actual URL must be resolved/expanded 
          before using it. This specification does not define a specific URI-Template as described in the RFC section 2.2. 
          
          A URI-Template expression with a variable-list containing of (varspec) variables requires for each variable a 
          corresponding reference to a list of the actual values. The RFC does not specify how to resolve this in detail 
          (see RFC, template processor), this is subject to a vendor such as per individual logged in user. 
          In this specification a framework how to define the placeholder data is specified, for this the following 
          definitions MUST apply:
            
            - A corresponding _templates_ member MUST be defined, for each used *varspec* variable a corresponding member with 
              the same (varspec) name MUST be defined as part of the _templates_ member.
            - The *varspec* member:
              -  MUST contain a _values_  member, expressed as an array (that can be also empty).
              -  MAY contain a _description_ member.
              -  MAY contain a _rel_ member, used to express a machine-readable relation from 
                 a specific *varspec* member to a present _links_ member. To do this both members need to specify 
                 the same rel member value (for this see links member).
  
        #### links
        
        The _links_ member from above contains an array of resource objects, expressing Endpoints from the KNX IoT 3rd Party API, 
        additionally from a KNX manufacturer. 

        - The _type_ is expressing the Content-Type of the endpoint.
        - The _typedescription_ is expressing an URL that hosts potentially human readable data.
        - The _href_  is expressing a relative URL, the absolute URL MUST be constructed 
          together with the _base_ member value of the intended API version. The _href_ member may use an URI-Template, 
          for this see at _base_.
        - The _rel_ is expressing a similar meaning as the rel attribute on HTML. It is used to express a machine-
          readable meaning/type of the (href) link. To define a standardized meaning the API resource path definitions 
          define some values that can be used together with the rel member. 
          - datapoints
          - devices
          - functions
          - node
          - installations
          - sites
          - locations
          - subscriptions  
          
          Other rel member values are vendor specific. 

        #### context 

        The _context_ member contains an array of resource objects, expressing the in the API used IRIs and its corresponding 
        namespace prefixes from the KIM, additionally also from a KNX manufacturer. They are mainly used on filtering with 
        query parameters and as part of responded resource items. If expressed, each _context_ member MUST contain 
        a _prefix_ and _iri_ member.

        - The _prefix_ defines the namespace prefix as it used in the API (excluding the ":").
        - The _iri_ defines the IRI/URL of the namespace prefix.

        #### additional content 
        
        KNX manufacturer specific members are optional, they MUST be added as an individual member representing a single 
        resource object in addition to the (top-level) members defined above (embedding any vendor content as part of one 
        of the defined members is not allowed).

        ### NOTES
        The _version_ member does not relate to the JSON API (specification) version as such, which is a optional 
        part of the response with the member _jsonapi:{version:1.0}_.   
      content:
        application/json:
          schema:
            $ref: "./schemas/WellKnownKNX.json"
          examples:
            Runtime 1:
              summary: Common Members
              description: |
                The example shows:
                - the most recent API version with its corresponding URL part 
                - the older supported API versions (1.1.0./1.0.5) 
                - some API entry points (links); from this API and vendor specific entry points, expressed as relative IRI 
                  (final URL needs to be concatenated with the URL __base__), additionally one predefined relation identifier 
                - some (but not all) of the in the API used namespace prefixes 
                - one vendor specific member 
              value:
                api:
                  version: 2.1.0
                  base: /api/v2
                
                supportedversions:
                  - version: 1.1.0
                    base: /api/v1
                  - version: 1.0.5
                    base: /api/v1
                
                links:
                  - href: /installations 
                    contenttype: application/vnd.api+json   
                  
                  - href: /node
                    contenttype: application/vnd.api+json 
                    rel: node
                    typedescription: https://schema.knx.org/2020/api/work_in_progress?visualisation=swagger#/information/getNode
                    # EXAMPLE URL with version identifier of schema.knx.org (not GIT branch name) + swagger tag + endpoint operation id
                  
                  - href: /vendor
                    contenttype: application/vnd.api+json  
                
                context:
                  - prefix: knx
                    iri: http://schema.knx.org/2020/ontology/knx#
                  - prefix: loc
                    iri: http://schema.knx.org/2020/ontology/loc#
                
                projects:
                  projectLink: /sites/7de4cf57-69dc-4dc7-90d7-164f5fc7e7dd
                  user: John Deere
                  premiseURL: https://node.vimar.cloud/1234567    
            
            Runtime 2:
              summary: Installation Path
              description: |
                The example shows:
                - the most recent API version with its corresponding URL part, including a project reference (as UUID)
                - no older supported API versions  
                - no API entry points (links) 
                - no context entries
              value:
                api:
                  version: 2.1.0
                  base: /api/v2/cloud/7de4cf57-69dc-4dc7-90d7-164f5fc7e7fa   
            
            Runtime 3:
              summary: Templated Path
              description: |
                The example shows:
                - the most recent API version with its corresponding URL part including some URI-Template from RFC 6570 
                  (one as empty array), additionally an relation between a base path placeholder and a vendor defined 
                  link/href URL
                - no older supported API versions  
                - no API entry points (links)
                - no context entries
                
                It is subject to a vendor how the URI templated part is resolved, such as per individual logged in user. 
                The example shows possible site values, while the subsequent location id is not yet defined at this step. 
              value:
                api:
                  version: 2.1.0
                  base: /api/v2/cloud/{siteId}/else/{locationId}
                  templates:
                    siteId:  
                      description: Site definitions.
                      values: [rome,berlin,brusseles,tokio]
                      rel: node 
                    locationId: 
                      description: Location definitions, needs to be filled in by the client/user.
                      values: []   
                links:       
                  - href: /node
                    contenttype: application/vnd.api+json  
                    rel: node   
                  - href: /opc/{providerId}
                    contenttype: application/vnd.api+json  
                    templates:
                      providerId: 
                        description: Dynamic part.
                        values: [one,two,three]
  examples:
       
    DatapointItemEnumExample0:
      summary: Enumeration Value
      description: |
        The example shows a received enumeration value, the format of the value is a (JSON) string.
        Possible values are "on" and "off".
        
        The type is of _datapoint_, it includes: 
          
        an `attributes` member expressing that the datapoint contains of: 
        -  **writable**, **readable** (the datapoint can be read / written from the API)
        -  **enum** (the possible datapoint values)
        -  **datapointType** (an additional datapoint type information as URN and IRI, the latter with namespace identifier)
        -  **knx:groupAddress** property, additional KNX information model (data) property, with mandatory namespace identifier, 
           the member value origin is a MaC project (requires also a namespace identifier)
        -  **tag:QualityKind** and **tag:OperationKind** JSON objects, including some properties (tags) from the KNX Information Model, 
           with mandatory namespace identifiers 
        
        a `meta` member expressing that the datapoint is of type: 
          - **knx:dpa.417.61** (a KNX Information Model (KIM) class name, including its namespace identifier) 
          - **urn:knx:dpa.417.61** (the URN definition, belonging to the KIM class type directly above) 
          
      value:
        data:
          id: 1f48bf82-acee-45a1-9038-e2748860a462
          type: datapoint
          attributes:
            title: On and off switching
            description: Status of the light in the bathroom
            readable: true
            writable: true
            value: "on"
            valueType: string
            timestamp: "2021-02-17T17:17:17Z" # quotes added additionally to prevent UI renderer problems
            enum: [on,off]  
            datapointType: [urn:knx:dpt.switch,knx:switch]
            knx:groupAddress: 1234 
            knx:measuresEquipmentType:
              "@type": tag:QualityKind
              tag:hasEquipmentType: tag:luminaire
              tag:hasQuantityKind: tag:DimmLevel
              tag:hasLocality: tag:room
            knx:hasOperationKind:
              "@type": tag:OperationKind
              tag:hasPointOperation: tag:enumeration
              tag:hasPointFunctionType: tag:pv
              tag:hasStateType: [tag:on, tag:off]
          meta:
            "@type": [knx:dpa.417.61, urn:knx:dpa.417.61]
            typedescription: https://schema.knx.org/2020/api/work_in_progress?visualisation=swagger#/datapoint/getDatapoint 
            # URL uses version identifier of schema.knx.org (not GIT branch name) + swagger tag + endpoint operation id
          relationships:
            datapointFunctions:
              links:
                related: /datapoints/1f48bf82-acee-45a1-9038-e2748860a462/functions
            datapointDevice:
              links:
                related: /datapoints/1f48bf82-acee-45a1-9038-e2748860a462/device
            datapointProxy:
              links:
                related: /datapoints/1f48bf82-acee-45a1-9038-e2748860a462/proxies
            datapointSubscriptions:
              links:
                related: /datapoints/1f48bf82-acee-45a1-9038-e2748860a462/subscriptions    
            
    DatapointItemNumberExample1:
      summary: Numbered Value 1
      description: |
        The example shows a received number value, the format of the value is a (JSON) string.
        
        The type is of _datapoint_, it includes: 
  
        an `attributes` member expressing that the datapoint contains of: 
        -  **writable**, **readable** (the datapoint can be read or written from the API)
        -  **minimum**, **maximum** (the datapoint has some min/max applicative - value - limitations, including a value resolution)
        -  **unit** (the datapoint has a % unit, expressed with the QUDT individual)
        
        As a note, the returned value **32** is respecting the resolution of **2**, for sure also the min/max range. 
        
        a `meta` member expressing that the datapoint type is of: 
        - **knx:dpa.418.52** (a KNX Information Model (KIM) class name, including its namespace identifier) 
        
      value:
        data:
          id: 1f48bf82-acee-45a1-9038-e2748860a463
          type: datapoint
          attributes:
            title: Brightness
            description: Brightness of the light in the bathroom
            readable: true
            value: "32"
            valueType: string
            timestamp: "2021-02-17T17:17:17Z" # quotes added additionally to prevent UI renderer problems 
            unit: unit:PERCENT
            datapointType: [knx:scaling]
            minimum: 30.5
            maximum: 50
            resolution: 2
          meta:
            "@type": [knx:dpa.418.52]
            typedescription:  https://schema.knx.org/2020/api/work_in_progress?visualisation=swagger#/datapoint/getDatapoint 
            # URL uses version identifier of schema.knx.org (not GIT branch name) + swagger tag + endpoint operation id
          relationships:
            datapointFunctions:
              links:
                related: /datapoints/1f48bf82-acee-45a1-9038-e2748860a463/functions
            datapointDevice:
              links:
                related: /datapoints/1f48bf82-acee-45a1-9038-e2748860a463/device
            datapointProxy:
              links:
                related: /datapoints/1f48bf82-acee-45a1-9038-e2748860a463/proxies
            datapointSubscriptions:
              links:
                related: /datapoints/1f48bf82-acee-45a1-9038-e2748860a463/subscriptions  
            
    DatapointItemNumberExample2:
      summary: Numbered Value 2
      description: |
        The example shows a received number value, the format of the value is a (JSON) string.
        
        The type is of _datapoint_, it includes: 
  
        an `attributes` member expressing that datapoint contains of: 
        -  **writable**, **readable** (the datapoint can only be read from the API)
        -  **minimum**, **maximum** (the datapoint has some min/max applicative - value - limitations)
        -  **unit** (the datapoint has a % unit, expressed with the QUDT individual)
        - **datapointType** (an additional datapoint type information as IRI with namespace identifier)
        
        a `meta` member expressing that the datapoint type is of: 
        - **knx:FunctionPoint** point type (a KNX Information Model class name, including its namespace identifier) 
  
      value:
        data:
          id: 1f48bf82-acee-45a1-9038-e2748860a464
