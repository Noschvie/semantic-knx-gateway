  /oauth/access:
    post:
      summary: Handles the authorization management.
      description: |
        # General
        Retrieve an access token to access a protected resource using OAuth2. 
        
        # Details
        The endpoint MUST be accessible without any defined scope from the resource endpoints (manage/read/write), 
        the authentication method/data depends on the chosen OAuth2 grant types. Transport security is mandatory.   

        An (beforehand) authenticated client/user obtains from this OAuth2 *token endpoint* - hosted on the 
        **authorization server** - an authorization grant in form of an access token (that can be refreshed by using 
        a refresh token). The endpoint URL is the same to initially get an access token or refresh an access token.
        
        ## Security Methods
        
        To ensure secured access to the (protected) resource endpoints the following security frameworks are used in a public 
        (WAN) and local (LAN) environment, where explicitly needed also defined with a corresponding security schema in this file.  
        - OAuth2 (RFC 6749) -> Scopes, Authorization Code Grant, Client Credentials Grant, ...
        - Bearer Token Usage (RFC 6750), clause 2.1  -> access to the protected resource endpoints
        - Basic Authentication Scheme (RFC 7617) -> access to the OAuth2 token endpoint + /.well-known/knx* endpoints 
        
        How a client/user obtains authorization from the resource owner (OAuth2 *authorization endpoint*) is out of scope 
        for this API (only the OAuth2 *authorization endpoint* URL is specified, see API security scheme definitions). 
              
        To access a **protected** resource at the **resource server** each endpoint has its security setting that defines the 
        intended (OAuth2) access scopes (scopes specified as part of the OAuth2 security scheme in this file). 
        
        - From this **token endpoint** retrieved access tokens are bound to the permission granted by the defined access scope.
        - The access token _type_ is specified as a `Bearer` token, format is string, no further explicit meaning such as on a JWT. 
        - The refresh token _type_ is specified as a string, no further explicit meaning.
        
        The Format UUID is not recommended for a token, this weakens the security because of predictable format and content. 
        As a note, not all endpoints requires an authentication respectively security schema, such as /.well-known and others, 
        for this look at the defined at the endpoints. 
               
        ## Workflow
        To access a protected resource at the resource server the clients perform the following steps. 

        - **STEP 1** : The client accesses the token endpoint (at the authorization server) to 
                       get initially an access token or refresh an existing one.  

        - **STEP 2** : Each time the client accesses a protected resource (at the resource server) it uses the above retrieved (OAuth2) 
                       access token with Bearer Authentication Scheme as `Bearer` token, included in the HTTP request Authorization header. 
                       
        ## Note
        The _Authorization_ header parameter and the Bearer Authentication Scheme is NOT explicitly specified per defined resource 
        server endpoint in this file. This must be added in addition to the request. 
        
        - The commonly used _Authorization_ header parameter belongs to HTTP, not specified further here. Only functionally required 
          header parameter described in this file.
        
        - To describe the involved security schemes (OAuth2 with corresponding scopes + Bearer Authentication Scheme) at once per 
          endpoint, it is not possible to express this in OpenAPI for the here intended purpose.   

      tags:
        - authorization
      operationId: getOauthToken
      requestBody:
        description: |
          As described in clause **Details** above the endpoint supports two scenarios.
          ### retrieve access token
          
          #### authorization grant
          It returns an access token, using the following input parameters:
          - grant_type (`authorization_code`)
          - code (retrieved from authorization server)
          - redirect_uri 
          - client_id
        
          As implementers note, according to RFC clause 4.1.3: 
          - the client MUST be authenticated with the authorization server
          - the _redirect_uri_ is mandatory, if it was included in the authorization request (to compare it) 
          - the _client_id_ is mandatory, if the client is not authenticating with the authorization server
            
            Depending on the OAuth2 (confidential, public) client type the _client_id_ may needed as be part of
            the request. Moreover, the _Authorization_ header parameter is not used in case of a public client.  

          The intended (access) scope is reflected via the parameter **code**, 
          the actual scope as such was part of the request to the authorization endpoint (handling of this EP is out of scope). 

          #### client credentials grant
          It returns an access token, using the following input parameters:
          - grant_type (`client_credentials`)
          - scope
        
          As implementers note, according to RFC clause 4.4.2: 
          - the client MUST be authenticated with the authorization server
            
          The intended (access) scope is reflected via the parameter **scope**, part of the request to this endpoint. 
          The scope can be a list, also defining vendor specific scopes (see examples).  
          
          ### refresh access token 
          It returns an new (refreshed) access token using the following input parameters:
          - grant_type (`refresh_token`)
          - refresh_token
          
          As implementers note, according to RFC clause 5: 
          - the client MUST be authenticated with the authorization server
          
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              oneOf:
                - $ref: "./schemas/oAuth2AccessTokenAuthorizationGrant.json"
                - $ref: "./schemas/oAuth2AccessTokenClientCredentialsGrant.json"
                - $ref: "./schemas/oAuth2RefreshToken.json"
            examples:
              Runtime1:
                summary: Runtime (get access token, authorization code grant)
                description: Retrieve an access token with a **Authorization Code Grant**. 
                  The client_id is not used in this example; the client is authenticated. 
                value:
                  grant_type: authorization_code
                  code: IamAnArbitraryAuthorizationCodeString
                  redirect_uri: http://localhost:8080/client_app/cb  
              Runtime2:
                summary: Runtime (get access token, client credentials grant)
                description: Retrieve an access token with a **Client Credentials Grant**. 
                value:
                  grant_type: client_credentials
                  scope: read
              Runtime3:
                summary: Runtime (refresh access token)
                description: Refresh an access token.   
                value:
                  grant_type: refresh_token
                  refresh_token: IamAnArbitraryRefreshTokenString
              Runtime4:
                summary: Runtime (get access token, client credentials grant, vendor scope)
                description: Retrieve an access token with a **Client Credentials Grant**. A vendor defined scope is included that 
                             was explicitly defined from the vendor to limit the lifetime (1h) of the returned access token.
                value:
                  grant_type: client_credentials
                  scope: write time_3600         
      responses:
        "200":
          $ref: "#/components/responses/Access200"
        "400":
          $ref: "#/components/responses/httpStatusBadRequestOAuth2"
        "401":
          $ref: "#/components/responses/httpStatusUnauthorized"
        "403":
          $ref: "#/components/responses/httpStatusForbidden"
        "404":
          $ref: "#/components/responses/httpStatusNotFound"  
        "405":
          $ref: "#/components/responses/httpStatusMethodNotAllowed"
        "406":
          $ref: "#/components/responses/httpStatusNotAcceptable"
        "409":
          $ref: "#/components/responses/httpStatusConflict"
        "414":
          $ref: "#/components/responses/httpStatusURITooLong"
        "415":
          $ref: "#/components/responses/httpStatusUnsupportedContentFormat"
        "422":
          $ref: "#/components/responses/UnprocessableEntity"   
        "429":
          $ref: "#/components/responses/httpStatusTooManyRequests"
        "500":
          $ref: "#/components/responses/httpStatusDefaultError"
        "501":
          $ref: "#/components/responses/httpStatusNotImplemented"  
        "504":
          $ref: "#/components/responses/httpStatusRequestTimeout"
        "505":
          $ref: "#/components/responses/httpStatusVersion"
      security: 
        - BasicAuthentication: []   
        - {}  
  
