# docker-compose.yml
# Base configuration – shared by all environments.
# Do NOT use directly. Always combine with an environment overlay:
#   Development : docker compose -f docker-compose.yml -f docker-compose.dev.yml  up -d
#   Production  : docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d

services:
  semantic-knx-runtime:
    user: "${USER_ID:-1000}:${GROUP_ID:-1000}"
    container_name: semantic-knx-runtime
    env_file:
      - .env
    environment:
      - POSTGRES_HOST=${POSTGRES_HOST}
      - POSTGRES_PORT=${POSTGRES_PORT}
      - POSTGRES_USERNAME=${POSTGRES_USERNAME}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
      - TIMESCALEDB_ENABLED=${TIMESCALEDB_ENABLED:-false}
      - KNX_GATEWAY_IP=${KNX_GATEWAY_IP}
      - KNX_GATEWAY_PORT=${KNX_GATEWAY_PORT}
      - KNX_GATEWAY_PHYS_ADDR=${KNX_GATEWAY_PHYS_ADDR}
    ports:
      - "3000:3000"
    volumes:
      - ./logs:/app/logs
      - ./config:/app/config:ro
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://127.0.0.1:3000/.well-known/knx || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s
    depends_on:
      timescaledb:
        condition: service_healthy

  timescaledb:
    image: timescale/timescaledb:latest-pg18
    container_name: timescaledb
    environment:
      - TIMESCALEDB_TELEMETRY=off
      - POSTGRES_USER=${POSTGRES_USERNAME}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
      - PGDATA=/var/lib/postgresql/data/pgdata
      - TS_TUNE_MEMORY=${TS_TUNE_MEMORY:-}
      - TS_TUNE_NUM_CPUS=${TS_TUNE_NUM_CPUS:-}
    ports:
      - "5432:5432"
    volumes:
      - ./volumes/timescaledb/data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USERNAME} -d ${POSTGRES_DB}"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 60s
    logging:
      options:
        max-size: "10m"
        max-file: "3"
